<svg width="100%" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#0b0b1f"/>
<stop offset="50%" stop-color="#1a1a3a"/>
<stop offset="100%" stop-color="#0f0c29"/>
</linearGradient>

<linearGradient id="neonGradient">
<stop offset="0%" stop-color="#00ffff"/>
<stop offset="100%" stop-color="#ff00ff"/>
</linearGradient>

<filter id="glow">
<feGaussianBlur stdDeviation="1.5"/>
</filter>

<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
<path d="M 40 0 L 0 0 0 40"
fill="none"
stroke="#00ffff"
stroke-opacity="0.06"/>
</pattern>

<pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
<rect width="4" height="1" fill="rgba(255,255,255,0.03)"/>
</pattern>

</defs>

<!-- background -->

<rect width="100%" height="100%" fill="url(#bgGradient)"/>
<rect width="100%" height="100%" fill="url(#grid)"/>
<rect width="100%" height="100%" fill="url(#scanlines)"/>

<!-- neon frame -->

<rect x="5" y="5" width="890" height="310"
fill="none"
stroke="#00ffff"
stroke-opacity="0.15"/>

<!-- horizon -->

<line x1="0" y1="200" x2="900" y2="200"
stroke="#00ffff"
stroke-opacity="0.2"/>

<!-- animated scan sweep -->

<rect x="-200" y="0" width="200" height="320"
fill="url(#neonGradient)"
opacity="0.05">

<animate attributeName="x"
from="-200"
to="900"
dur="6s"
repeatCount="indefinite"/>

</rect>

<!-- title glow -->

<text x="450"
y="90"
text-anchor="middle"
font-family="monospace"
font-size="42"
fill="#00ffff"
opacity="0.35"
filter="url(#glow)">
JOHN RELIX PASCUA
</text>

<!-- title sharp -->

<text x="450"
y="90"
text-anchor="middle"
font-family="monospace"
font-size="42"
fill="url(#neonGradient)">
JOHN RELIX PASCUA
</text>

<!-- subtitle -->

<text x="450"
y="120"
text-anchor="middle"
font-family="monospace"
font-size="18"
fill="#ffffff">
Developer • Web • Mobile • Systems
</text>

<!-- typing line -->

<text x="450"
y="150"
text-anchor="middle"
font-family="monospace"
font-size="14"
fill="#00ffff">
Building web apps • mobile apps • automation tools
</text>

<!-- typing cursor -->

<rect x="690" y="140"
width="8"
height="14"
fill="#00ffff">

<animate attributeName="opacity"
values="1;0;1"
dur="1s"
repeatCount="indefinite"/>

</rect>

<!-- terminal -->

<text x="450"
y="215"
text-anchor="middle"
font-family="monospace"
font-size="14"
fill="#00ffcc"
opacity="0">

> booting developer profile...

<animate attributeName="opacity"
from="0"
to="1"
dur="0.4s"
begin="0.5s"
fill="freeze"/>

</text>

<text x="450"
y="235"
text-anchor="middle"
font-family="monospace"
font-size="14"
fill="#00ffcc"
opacity="0">

> loading neural modules...

<animate attributeName="opacity"
from="0"
to="1"
dur="0.4s"
begin="1s"
fill="freeze"/>

</text>

<text x="450"
y="255"
text-anchor="middle"
font-family="monospace"
font-size="14"
fill="#00ffcc"
opacity="0">

> systems ready

<animate attributeName="opacity"
from="0"
to="1"
dur="0.4s"
begin="1.5s"
fill="freeze"/>

</text>

<!-- data bars -->

<rect x="120" y="270" width="60" height="4" fill="#00ffff">
<animate attributeName="width" values="40;80;40" dur="3s" repeatCount="indefinite"/>
</rect>

<rect x="720" y="270" width="60" height="4" fill="#ff00ff">
<animate attributeName="width" values="80;40;80" dur="3s" repeatCount="indefinite"/>
</rect>

<!-- skills -->

<text x="450"
y="295"
text-anchor="middle"
font-family="monospace"
font-size="13"
fill="#ffffff">
HTML • JavaScript • TypeScript • Dart • Go • Python • PHP • Flutter • Node.js
</text>

</svg>
