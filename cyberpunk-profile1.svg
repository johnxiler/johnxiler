<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>

    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#ff00ff"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="rgba(255,255,255,0.03)"/>
    </pattern>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ffff" stroke-opacity="0.05"/>
    </pattern>

    <clipPath id="avatarClip">
      <circle cx="120" cy="100" r="50"/>
    </clipPath>

  </defs>

  <!-- background -->
  <rect width="100%" height="100%" fill="url(#bgGradient)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <rect width="100%" height="100%" fill="url(#scanlines)"/>

  <!-- avatar -->
  <circle cx="120" cy="100" r="54"
          fill="none"
          stroke="url(#neonGradient)"
          stroke-width="3"
          filter="url(#glow)"/>

  <image
    href="https://avatars.githubusercontent.com/u/65880846"
    x="70"
    y="50"
    width="100"
    height="100"
    clip-path="url(#avatarClip)"
  />

  <!-- name -->
  <text x="600" y="80"
        text-anchor="middle"
        font-family="monospace"
        font-size="42"
        fill="url(#neonGradient)"
        filter="url(#glow)">
        JOHN RELIX PASCUA
  </text>

  <!-- subtitle -->
  <text x="600" y="110"
        text-anchor="middle"
        font-family="monospace"
        font-size="18"
        fill="#ffffff">
        Developer • Web • Mobile • Systems
  </text>

  <!-- typing line -->
  <text x="600" y="140"
        text-anchor="middle"
        font-family="monospace"
        font-size="14"
        fill="#00ffff"
        opacity="0">
        Building web apps • mobile apps • automation tools
        <animate attributeName="opacity"
                 from="0"
                 to="1"
                 dur="1s"
                 begin="0.3s"
                 fill="freeze"/>
  </text>

  <!-- terminal logs -->
  <text x="260" y="200"
        font-family="monospace"
        font-size="14"
        fill="#00ffcc"
        opacity="0">
        > booting developer profile...
        <animate attributeName="opacity"
                 from="0"
                 to="1"
                 begin="0.8s"
                 dur="0.4s"
                 fill="freeze"/>
  </text>

  <text x="260" y="220"
        font-family="monospace"
        font-size="14"
        fill="#00ffcc"
        opacity="0">
        > loading projects...
        <animate attributeName="opacity"
                 from="0"
                 to="1"
                 begin="1.4s"
                 dur="0.4s"
                 fill="freeze"/>
  </text>

  <text x="260" y="240"
        font-family="monospace"
        font-size="14"
        fill="#00ffcc"
        opacity="0">
        > initializing dev environment...
        <animate attributeName="opacity"
                 from="0"
                 to="1"
                 begin="2s"
                 dur="0.4s"
                 fill="freeze"/>
  </text>

  <text x="260" y="260"
        font-family="monospace"
        font-size="14"
        fill="#00ffcc"
        opacity="0">
        > systems ready
        <animate attributeName="opacity"
                 from="0"
                 to="1"
                 begin="2.6s"
                 dur="0.4s"
                 fill="freeze"/>
  </text>

  <!-- skills -->
  <text x="600" y="295"
        text-anchor="middle"
        font-family="monospace"
        font-size="13"
        fill="#ffffff">
        HTML • JavaScript • TypeScript • Dart • Go • Python • PHP • Flutter • Node.js
  </text>

</svg>
