<svg width="100%" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#0f0c29"/>
<stop offset="50%" stop-color="#302b63"/>
<stop offset="100%" stop-color="#24243e"/>
</linearGradient>

<linearGradient id="neonGradient">
<stop offset="0%" stop-color="#00ffff"/>
<stop offset="100%" stop-color="#ff00ff"/>
</linearGradient>

<filter id="glow">
<feGaussianBlur stdDeviation="1"/>
</filter>

<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
<path d="M 40 0 L 0 0 0 40"
fill="none"
stroke="#00ffff"
stroke-opacity="0.04"/>
</pattern>

<pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
<rect width="4" height="1" fill="rgba(255,255,255,0.03)"/>
</pattern>

</defs>

<!-- background -->

<rect width="100%" height="100%" fill="url(#bgGradient)"/>
<rect width="100%" height="100%" fill="url(#grid)"/>
<rect width="100%" height="100%" fill="url(#scanlines)"/>

<!-- horizon line -->

<line x1="0" y1="200" x2="900" y2="200"
stroke="#00ffff"
stroke-opacity="0.15"/>

<!-- title -->

<text x="450"
y="90"
text-anchor="middle"
font-family="monospace"
font-size="42"
fill="url(#neonGradient)"
filter="url(#glow)">
JOHN RELIX PASCUA
</text>

<!-- sharp text -->
<text x="450"
y="90"
text-anchor="middle"
font-family="monospace"
font-size="42"
fill="url(#neonGradient)">
JOHN RELIX PASCUA
</text>

<!-- subtitle -->

<text x="450"
y="120"
text-anchor="middle"
font-family="monospace"
font-size="18"
fill="#ffffff">
Developer • Web • Mobile • Systems
</text>

<!-- typing line -->

<text x="450"
y="150"
text-anchor="middle"
font-family="monospace"
font-size="14"
fill="#00ffff">
Building web apps • mobile apps • automation tools
</text>

<!-- typing cursor -->

<rect x="680" y="140"
width="8"
height="14"
fill="#00ffff">

<animate attributeName="opacity"
values="1;0;1"
dur="1s"
repeatCount="indefinite"/>

</rect>

<!-- terminal logs -->

<text x="450"
y="220"
text-anchor="middle"
font-family="monospace"
font-size="14"
fill="#00ffcc"
opacity="0">

> booting developer profile...

<animate attributeName="opacity"
from="0"
to="1"
dur="0.4s"
begin="0.6s"
fill="freeze"/>

</text>

<text x="450"
y="240"
text-anchor="middle"
font-family="monospace"
font-size="14"
fill="#00ffcc"
opacity="0">

> loading development tools...

<animate attributeName="opacity"
from="0"
to="1"
dur="0.4s"
begin="1.1s"
fill="freeze"/>

</text>

<text x="450"
y="260"
text-anchor="middle"
font-family="monospace"
font-size="14"
fill="#00ffcc"
opacity="0">

> system ready

<animate attributeName="opacity"
from="0"
to="1"
dur="0.4s"
begin="1.6s"
fill="freeze"/>

</text>

<!-- skills -->

<text x="450"
y="295"
text-anchor="middle"
font-family="monospace"
font-size="13"
fill="#ffffff">

HTML • JavaScript • TypeScript • Dart • Go • Python • PHP • Flutter • Node.js

</text>

</svg>
